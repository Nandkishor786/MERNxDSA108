<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Country Info Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Country Info Finder</h1>

    <div class="searchBox">
      <input type="text" id="search" placeholder="Enter country name">
      <button class="btn">Search</button>
    </div>

    <p id="loading">Loading...</p>
    <p id="error"></p>

    <div class="result">
      <h2 id="countryName"></h2>
      <p id="capital"></p>
      <p id="population"></p>
      <img id="flag">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
